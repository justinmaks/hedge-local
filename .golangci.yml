version: "2"
formatters:
  enable:
    - gofmt
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*os.Process).Kill
        - (*os.File).Seek
        - (*os/exec.Cmd).Wait
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
