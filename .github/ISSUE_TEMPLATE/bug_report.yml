name: Bug report
description: Report a problem with hcli
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not include
        prompt contents or other sensitive data from your telemetry database.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `hcli ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hcli version
      description: Output of `hcli version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: e.g. macOS 14 arm64, Ubuntu 24.04 amd64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `hcli logs` if applicable. Redact anything sensitive.
      render: shell
