project_name: hcli

before:
  hooks:
    - go mod tidy

builds:
  - id: hcli
    main: ./cmd/hcli
    binary: hcli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    builds: [hcli]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

nfpms:
  - id: default
    builds: [hcli]
    formats:
      - deb
      - rpm
    vendor: justinmaks
    homepage: https://github.com/justinmaks/hedge-local
    maintainer: justinmaks
    license: MIT
    description: Local-only telemetry TUI for coding agents
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: justinmaks
    name: hedge-local
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^fix:"