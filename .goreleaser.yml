version: 2

project_name: hcli

# Output to build/ rather than the default dist/, because dist/pricing/ is a
# source package (embedded bundled pricing) — GoReleaser's --clean would delete
# it otherwise.
dist: build

before:
  hooks:
    - go mod tidy

builds:
  - id: hcli
    main: ./cmd/hcli
    binary: hcli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/justinmaks/hedge-local/internal/cli.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids: [hcli]
    formats: [tar.gz]
    # Version-less so `releases/latest/download/hcli_<os>_<arch>.tar.gz` (used by
    # install.sh) has a stable name across releases.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

nfpms:
  - id: default
    ids: [hcli]
    formats:
      - deb
      - rpm
    vendor: justinmaks
    homepage: https://github.com/justinmaks/hedge-local
    maintainer: justinmaks
    license: MIT
    description: Local-only telemetry TUI for coding agents
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: justinmaks
    name: hedge-local
  draft: false
  prerelease: auto
  # Publish install.sh as a release asset so the README quickstart
  # (curl .../releases/latest/download/install.sh) resolves.
  extra_files:
    - glob: ./install.sh

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^fix:"
